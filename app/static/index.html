<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACE-FLOW</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background:
                linear-gradient(
                    rgba(0, 50, 80, 0.75),
                    rgba(0, 100, 140, 0.75)
                ),
                url("https://images.unsplash.com/photo-1437482078695-73f5ca6c96e2");
            background-size: cover;
            background-position: center;
            color: white;
            min-height: 100vh;
        }

        .container {
            width: 80%;
            max-width: 900px;
            margin: auto;
            padding-top: 40px;
            text-align: center;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 10px;
            letter-spacing: 3px;
        }

        h2 {
            font-size: 22px;
            font-weight: normal;
            margin-top: 0;
        }

        .team {
            font-size: 18px;
            margin: 25px 0 40px 0;
            font-style: italic;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255,255,255,0.9);
            color: #00334d;
            border-radius: 10px;
            overflow: hidden;
        }

        th {
            background: #006994;
            color: white;
            padding: 15px;
            font-size: 18px;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #cccccc;
            font-size: 16px;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .footer {
            margin-top: 40px;
            font-size: 14px;
            opacity: 0.8;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>ACE-FLOW</h1>

    <h2>
        AI-assisted Community Early warning for FLOod and Water hazards
    </h2>

    <div class="team">
        by Team Floodguard
    </div>


    <table>
        <tr>
            <th>Station</th>
            <th>Status</th>
            <th>Date/Time</th>
            <th>Image</th>
        </tr>

	{% for row in status_table %}
	<tr>
		<td>{{ row.station }}</td>
		<td>{{ row.status }}</td>
		<td>{{ row.time }}</td>
                <td>{% if row.image %}
                        <a href="{{ row.image }}" target="_blank">
                        <img src="{{ row.image }}" width="100"></a>
                    {% endif %}
                </td>
	</tr>
	{% endfor %}
    </table>


    <div class="footer">
        ACE-FLOW Monitoring System
    </div>

</div>

</body>
</html>
